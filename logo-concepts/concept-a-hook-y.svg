<!-- Concept A: "Hook Y" — Y monogram where the stem curls into a hook catching a dot.
     Reads as the letter Y + the act of yoinking something into your grasp.
     Works at toolbar size (16px) thanks to bold strokes and high contrast. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c187"/>
      <stop offset="1" stop-color="#0f9d6b"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bgA)"/>

  <!-- Subtle inner highlight for depth -->
  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" ry="27.5"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- The Y: two diagonals meeting at center, then a hook -->
  <g fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left diagonal -->
    <path d="M 36 32 L 64 64"/>
    <!-- Right diagonal -->
    <path d="M 92 32 L 64 64"/>
    <!-- Stem curling into a hook that "catches" the dot -->
    <path d="M 64 64 L 64 84 Q 64 100 80 100"/>
  </g>

  <!-- Caught dot — the cookie being yoinked -->
  <circle cx="86" cy="100" r="7" fill="#ffffff"/>
</svg>
