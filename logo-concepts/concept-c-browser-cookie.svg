<!-- Concept C: "Browser → Cookie" — your idea, vectorized.
     Browser window with code brackets + green arrow swooping out to grab
     a bitten chocolate-chip cookie. No wordmark. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Mask cuts the bite out of the cookie -->
    <mask id="bite-c">
      <rect width="128" height="128" fill="white"/>
      <circle cx="116" cy="58" r="11" fill="black"/>
    </mask>
    <linearGradient id="topbar-c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6db4f7"/>
      <stop offset="1" stop-color="#4a96e6"/>
    </linearGradient>
    <radialGradient id="cookie-c" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#d9a866"/>
      <stop offset="1" stop-color="#b07a3e"/>
    </radialGradient>
  </defs>

  <!-- Browser window -->
  <g>
    <!-- Body -->
    <rect x="10" y="26" width="62" height="60" rx="6" fill="#ffffff" stroke="#1f3a5f" stroke-width="3"/>
    <!-- Top bar (only top rounded) -->
    <path d="M 10 32 a 6 6 0 0 1 6 -6 h 50 a 6 6 0 0 1 6 6 v 8 h -62 z"
          fill="url(#topbar-c)" stroke="#1f3a5f" stroke-width="3" stroke-linejoin="round"/>
    <!-- Traffic lights -->
    <circle cx="18" cy="34" r="2.6" fill="#2ecc71"/>
    <circle cx="26" cy="34" r="2.6" fill="#f5c542"/>
    <circle cx="34" cy="34" r="2.6" fill="#1f3a5f"/>
    <!-- Code </> -->
    <g fill="none" stroke="#9eb1c8" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="30,54 22,64 30,74"/>
      <polyline points="52,54 60,64 52,74"/>
      <line x1="36" y1="76" x2="46" y2="52"/>
    </g>
  </g>

  <!-- Green arrow swooping from browser to cookie -->
  <g>
    <path d="M 28 92 Q 56 112 84 96"
          fill="none" stroke="#2eb574" stroke-width="9"
          stroke-linecap="round"/>
    <path d="M 84 96 L 72 88 M 84 96 L 78 108"
          fill="none" stroke="#2eb574" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Cookie with bite -->
  <g mask="url(#bite-c)">
    <circle cx="94" cy="70" r="26" fill="url(#cookie-c)" stroke="#5e3a18" stroke-width="3"/>
    <!-- Chocolate chips -->
    <g fill="#3d2410">
      <circle cx="84" cy="64" r="3.5"/>
      <circle cx="100" cy="62" r="3"/>
      <circle cx="104" cy="74" r="4"/>
      <circle cx="88" cy="80" r="3.5"/>
      <circle cx="98" cy="86" r="3"/>
      <circle cx="82" cy="74" r="2.5"/>
    </g>
  </g>
</svg>
