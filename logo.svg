<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Mask: cookie body minus the bite + the chip cutouts -->
    <mask id="cookieMask">
      <!-- Cookie body (white = visible) -->
      <circle cx="128" cy="128" r="88" fill="white"/>
      <!-- Bite cutout (black = transparent), nestled into the top-right edge -->
      <circle cx="200" cy="84" r="34" fill="black"/>
      <!-- Chip cutouts -->
      <circle cx="96"  cy="100" r="9"  fill="black"/>
      <circle cx="142" cy="96"  r="7"  fill="black"/>
      <circle cx="160" cy="138" r="9"  fill="black"/>
      <circle cx="106" cy="150" r="8"  fill="black"/>
      <circle cx="135" cy="170" r="7"  fill="black"/>
      <circle cx="80"  cy="130" r="5"  fill="black"/>
    </mask>
  </defs>

  <rect width="256" height="256" fill="white"/>

  <!-- Single solid color cookie -->
  <circle cx="128" cy="128" r="88" fill="#FF6A00" mask="url(#cookieMask)"/>
</svg>
